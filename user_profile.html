<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile - MABARYUK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/profile.css" />
</head>
<body>
    <aside class="profile-panel">
        <header class="profile-header">
            <div class="profile-user">
                <div class="avatar">AB</div>
                <div>
                    <h2 id="profile-name">Pengguna MABARYUK</h2>
                    <p id="profile-phone">+62 812 3456 7890</p>
                </div>
            </div>
            <button id="profile-close" class="profile-close" aria-label="Tutup">&times;</button>
        </header>

        <section class="wallet">
            <div>
                <span>GoPay</span>
                <strong>Rp 250.000</strong>
            </div>
            <button type="button">Top Up</button>
        </section>

        <!-- Cart summary from localStorage JSON -->
        <section id="cart-summary" class="cart-summary">
            <h3 class="cart-title">🛒 Keranjang Belanja</h3>
            <div id="cart-list" class="cart-list">
                <p class="cart-empty-msg">Keranjang kosong</p>
            </div>
            <div id="cart-total" class="cart-total"></div>
        </section>

        <nav class="profile-nav">
            <button class="profile-link" type="button">Riwayat Pesanan</button>
            <button class="profile-link" type="button">Restoran Favorit</button>
            <button class="profile-link" type="button">Alamat Tersimpan</button>
            <button class="profile-link" type="button">Metode Pembayaran</button>
            <button class="profile-link" type="button">Promo & Voucher</button>
            <button class="profile-link" type="button">Pengaturan</button>
        </nav>

        <footer class="profile-footer">
            <button id="profile-logout" class="logout" type="button">Keluar</button>
        </footer>
    </aside>

    <script src="scripts/app-data.js"></script>
    <script src="scripts/user-profile.js"></script>
</body>
</html>
