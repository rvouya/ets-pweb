<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile Offcanvas - MABARYUK</title>
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  
    <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <link href="../styles/profile.css" rel="stylesheet" />
</head>
<body>

  <aside class="profile-panel">
    <header class="profile-header">
      <h2>Profil Saya</h2>
      <button class="close-btn" id="close-profile-btn" onclick="window.parent.postMessage({ type: 'close-profile' }, '*')">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>
    
    <div class="profile-body hide-scrollbar">
      
      <div class="user-info-card">
        <div class="avatar">
          <span class="material-symbols-outlined" style="font-size: 32px;">person</span>
        </div>
        <div>
          <h3 id="user-name" class="user-name">Pengguna Baru</h3>
          <p id="user-phone" class="user-phone">+62 8XX XXXX XXXX</p>
        </div>
      </div>
      
      <div class="menu-group">
        <div class="menu-group-title">Aktivitas</div>
        <button class="menu-item" onclick="window.parent.location.href='checkout.html'">
          <span class="material-symbols-outlined menu-icon">receipt_long</span>
          <span class="menu-text">Pesanan Saya</span>
          <span class="material-symbols-outlined menu-arrow">chevron_right</span>
        </button>
        <button class="menu-item">
          <span class="material-symbols-outlined menu-icon">favorite</span>
          <span class="menu-text">Restoran Favorit</span>
          <span class="material-symbols-outlined menu-arrow">chevron_right</span>
        </button>
      </div>
      
      <div class="menu-group">
        <div class="menu-group-title">Akun &amp; Pengaturan</div>
        <button class="menu-item">
          <span class="material-symbols-outlined menu-icon">manage_accounts</span>
          <span class="menu-text">Edit Profil</span>
          <span class="material-symbols-outlined menu-arrow">chevron_right</span>
        </button>
        <button class="menu-item">
          <span class="material-symbols-outlined menu-icon">location_on</span>
          <span class="menu-text">Alamat Tersimpan</span>
          <span class="material-symbols-outlined menu-arrow">chevron_right</span>
        </button>
        <button class="menu-item">
          <span class="material-symbols-outlined menu-icon">payment</span>
          <span class="menu-text">Metode Pembayaran</span>
          <span class="material-symbols-outlined menu-arrow">chevron_right</span>
        </button>
      </div>
      
      <div class="menu-group">
        <div class="menu-group-title">Bantuan</div>
        <button class="menu-item">
          <span class="material-symbols-outlined menu-icon">help</span>
          <span class="menu-text">Pusat Bantuan</span>
          <span class="material-symbols-outlined menu-arrow">chevron_right</span>
        </button>
      </div>
      
      <button id="logout-btn" class="logout-btn mt-4">
        <span class="material-symbols-outlined">logout</span>
        <span>Keluar Akun</span>
      </button>
      
    </div>
    
    <footer class="profile-footer">
      MABARYUK App v1.0.0
    </footer>
  </aside>

  <script src="../scripts/app-data.js"></script>
  <script src="../scripts/user-profile.js"></script>
</body>
</html>
