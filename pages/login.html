<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MABARYUK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/login.css" />
</head>
<body>
    <main class="login-card">
        <a class="back-link" href="../landing_page.html">Kembali</a>
        <h1>Login / Sign Up</h1>
        <p>Masukkan data singkat untuk melanjutkan.</p>

        <form id="login-form">
            <div class="form-group">
                <label for="name">Nama</label>
                <input id="name" type="text" placeholder="Nama kamu" />
            </div>
            <div class="form-group">
                <label for="phone">Nomor HP</label>
                <input id="phone" type="tel" placeholder="81234567890" required />
            </div>
            <button class="btn btn-primary" type="submit">Masuk</button>
        </form>
    </main>

    <script src="../scripts/app-data.js"></script>
    <script src="../scripts/login.js"></script>
</body>
</html>
