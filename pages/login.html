<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - MABARYUK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="../styles/style.css" rel="stylesheet" />
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden">
    <!-- gambar latar belakang -->
    <div class="bg-image position-absolute w-100 h-100 z-0">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaHTHeq8VA2fAHPa1XkCXUcXQdBKS1lrHWIA49Ma2PJboAY8JHfc9pquxjLZ7ZmdRpR9Yo_7PQQ04sW4DywmkkMrcGIUxQoXMCKxOP_JrXv-qCnRdnPq_IMB2j-UkpolghQw0oR1yRhBIH7nfosXBktbTrrWb4iZtf7WAvr8S3oqqf2N5APfLbVwMM0NDVNVu9nGrq9JyfisRtGECYFepDMkJMO4DRt7imh0cKqqxy5S91V06edpQyN36nOc7TNSVzaAGJ46wKzw" alt="Background" class="w-100 h-100 object-fit-cover opacity-20" />
    </div>

    <!-- pembungkus utama -->
    <main class="login-container position-relative z-1 w-100 mx-3 p-4 p-md-5 d-flex flex-column">
        <!-- tombol tutup -->
        <button type="button" class="btn-close-custom position-absolute top-0 end-0 m-3 border-0 bg-transparent p-2 d-flex align-items-center justify-content-center rounded-circle" aria-label="Close" id="closeBtn">
            <span class="material-symbols-outlined">close</span>
        </button>

        <!-- bagian atas -->
        <header class="text-center mb-4 mt-2">
            <h1 class="h1-title mb-2">Masuk atau Daftar</h1>
            <p class="body-text text-on-surface-variant mb-0">Masukkan nomor HP kamu untuk lanjut</p>
        </header>

        <!-- bagian formulir -->
        <form id="loginForm" class="d-flex flex-column gap-3">
            <!-- grup input telepon -->
            <div class="phone-input-group d-flex align-items-center bg-white overflow-hidden">
                <div class="country-code d-flex align-items-center justify-content-center h-100 px-3 border-end">
                    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqtQeBU84c3ftEY0hymAV6Oy0dRJmi7dHDwbgQY2P4fePJIbJk6-VOtm_Og5YYNZPZi5RqjV-gFZBVuzv__ESIqDGr_zKhnWbToSndhl40oIuePTeFdn9wjQaHH1Wjb_kWt1G6KvlFleVSYXRKMTO_xna3FgUgJBnUOfDWeEXsuTHYg9Oo-qLuv8Dy0GmmzODjLqniZqJtwKc-mnEwJJUJLtEAZkpzCoGeab642YcV1CZS9zBsHRpKprv4HGak7EaOOebJ2gm93A" alt="Indonesia Flag" class="flag-icon me-2 rounded-sm" />
                    <span>+62</span>
                </div>
                <input type="tel" id="phone" name="phone" class="form-control border-0 shadow-none h-100 px-3 bg-transparent" placeholder="812 3456 7890" required autocomplete="tel" />
            </div>

            <!-- tombol aksi utama -->
            <button type="submit" class="btn btn-primary-custom w-100 rounded-pill py-3 mt-2">
                Lanjutkan
            </button>
        </form>

        <!-- syarat dan ketentuan -->
        <div class="mt-4 text-center">
            <p class="terms-text mb-0">
                Dengan melanjutkan, kamu menyetujui<br />
                <a href="#" class="terms-link text-decoration-none">Syarat &amp; Ketentuan</a> serta 
                <a href="#" class="terms-link text-decoration-none">Kebijakan Privasi</a> MABARYUK.
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/script.js"></script>
</body>
</html>
