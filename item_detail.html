<body class="bg-background font-body-md text-on-background antialiased selection:bg-primary-container selection:text-white">
<!-- App Background Context (Blurred out to focus on modal) -->
<div class="h-screen w-full bg-surface-container flex flex-col blur-[2px] opacity-60 pointer-events-none">
<header class="h-16 bg-surface-container-lowest border-b border-outline-variant/20 flex items-center px-4">
<div class="w-8 h-8 rounded-full bg-primary-container/20"></div>
<div class="ml-4 h-4 w-32 bg-outline-variant/30 rounded"></div>
</header>
<main class="flex-1 p-4 grid grid-cols-2 gap-4">
<div class="h-48 bg-surface-container-lowest rounded-xl"></div>
<div class="h-48 bg-surface-container-lowest rounded-xl"></div>
</main>
</div>
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-inverse-surface/60 backdrop-blur-sm p-4 sm:p-6">
<!-- Modal Container (Tactile Modernism) -->
<div class="bg-surface-container-lowest w-full max-w-md rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.12)] overflow-hidden flex flex-col max-h-[921px] scale-100 transition-transform">
<!-- Image Header -->
<div class="relative h-56 sm:h-64 w-full shrink-0 bg-surface-variant">
<img alt="Nasi Ayam Penyet" class="w-full h-full object-cover" data-alt="close-up of traditional indonesian smashed fried chicken dish with spicy red sambal, served with fresh cucumber and basil on a wooden table, warm appetizing lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVu5svnzE7snjas8t_Fkf9M53mrYaDPDUQVNOKPI9j3znYJMfixh7-MqR07mop21OxQLZMrBrA3cXiYL7vofI5CsvW66DhEOGT1zSo8rWj-TxHjlz9PhA45lgNn9OvlOewIKRk3wpYGEaw6V8a2ZlyVD4Ez8Vy3c4i8pO7Nga-A3_WVYQnkRbFKsKoeKLnm1E0cT4stne3_tvao0QPo7TZbCst99-QnAs6rM0WX9eOXjLTiLbeCwmC3FHAuZPEuAbLE6RntocO_Q"/>
<!-- Subtle gradient overlay for better integration -->
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest/80 via-transparent to-black/20"></div>
<!-- Close Button -->
<button class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center bg-white/90 backdrop-blur-md rounded-full text-on-surface shadow-sm hover:scale-105 active:scale-95 transition-all focus:outline-none focus:ring-2 focus:ring-primary-container">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">close</span>
</button>
</div>
<!-- Scrollable Content Canvas -->
<div class="p-6 overflow-y-auto flex-1 flex flex-col gap-8 custom-scrollbar">
<!-- Title & Description -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-start gap-4">
<h1 class="font-h1 text-h1 text-on-surface">Nasi Ayam Penyet</h1>
</div>
<p class="font-price text-price text-primary-container">Rp 35.000</p>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Ayam goreng rempah yang dipenyet dengan sambal terasi khas, disajikan lengkap dengan nasi putih hangat, tahu, tempe, dan lalapan segar.</p>
</div>
<!-- Section: Pilih Ukuran Porsi (Radio) -->
<div class="flex flex-col gap-4">
<div class="flex justify-between items-end">
<h2 class="font-h2 text-h2 text-on-surface">Pilih Ukuran Porsi</h2>
<span class="bg-primary-container/15 text-primary-container font-label-bold text-label-bold px-3 py-1 rounded-full">Wajib</span>
</div>
<div class="flex flex-col gap-3">
<!-- Radio Option: Active -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-primary-container bg-surface-container-low cursor-pointer hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
<span class="font-body-lg text-body-lg text-on-surface">Reguler</span>
</div>
<!-- Hidden actual radio input for accessibility/forms if needed -->
<input checked="" class="hidden" name="porsi" type="radio" value="reguler"/>
</label>
<!-- Radio Option: Inactive -->
<label class="flex items-center justify-between p-4 rounded-xl border border-outline-variant hover:border-primary-container/50 hover:bg-surface transition-colors cursor-pointer group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary-container/70 transition-colors">radio_button_unchecked</span>
<span class="font-body-lg text-body-lg text-on-surface">Jumbo</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant">+ Rp 10.000</span>
<input class="hidden" name="porsi" type="radio" value="jumbo"/>
</label>
</div>
</div>
<!-- Section: Tambahan (Checkbox) -->
<div class="flex flex-col gap-4">
<div class="flex justify-between items-end">
<h2 class="font-h2 text-h2 text-on-surface">Tambahan</h2>
<span class="text-on-surface-variant font-body-md text-body-md">Opsional</span>
</div>
<div class="flex flex-col gap-3">
<!-- Checkbox Option 1 -->
<label class="flex items-center justify-between p-4 rounded-xl border border-outline-variant hover:border-primary-container/50 hover:bg-surface transition-colors cursor-pointer group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary-container/70 transition-colors">check_box_outline_blank</span>
<span class="font-body-lg text-body-lg text-on-surface">Extra Sambal</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant">+ Rp 4.000</span>
<input class="hidden" name="tambahan" type="checkbox" value="sambal"/>
</label>
<!-- Checkbox Option 2 -->
<label class="flex items-center justify-between p-4 rounded-xl border border-outline-variant hover:border-primary-container/50 hover:bg-surface transition-colors cursor-pointer group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline group-hover:text-primary-container/70 transition-colors">check_box_outline_blank</span>
<span class="font-body-lg text-body-lg text-on-surface">Extra Nasi</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant">+ Rp 5.000</span>
<input class="hidden" name="tambahan" type="checkbox" value="nasi"/>
</label>
</div>
</div>
<!-- Bottom padding to ensure content isn't hidden behind the fixed bottom bar -->
<div class="h-2"></div>
</div>
<!-- Modal Footer (Sticky Bottom Action Bar) -->
<div class="p-4 sm:p-5 bg-surface-container-lowest border-t border-outline-variant/20 flex flex-col sm:flex-row items-center gap-4 shrink-0 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-10">
<!-- Quantity Stepper -->
<div class="flex items-center justify-between w-full sm:w-auto bg-surface-container rounded-full p-1 border border-outline-variant/30 shrink-0">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface hover:bg-surface-container-lowest hover:shadow-sm active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<span class="w-10 text-center font-h3 text-h3 text-on-surface">1</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-primary-container hover:bg-surface-container-lowest hover:shadow-sm active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
<!-- CTA Button -->
<button class="w-full flex-1 bg-primary-container text-white py-4 px-6 rounded-full font-h3 text-h3 flex justify-between items-center shadow-[0_4px_16px_rgba(255,114,76,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all focus:outline-none focus:ring-4 focus:ring-primary-container/30">
<span>Tambah ke Pesanan</span>
<span>Rp 35.000</span>
</button>
</div>
</div>
</div>
<!-- Custom scrollbar styling for webkit to keep UI clean -->
<style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e0bfb7; /* outline-variant */
            border-radius: 10px;
        }
    </style>
</body></html>
