<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Item Detail - MABARYUK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/item-detail.css" />
</head>
<body>
    <article class="detail-card">
        <div class="detail-image-wrap">
            <img id="detail-image" src="" alt="Item" />
              <button id="detail-close" class="detail-close" aria-label="Tutup">&times;</button>
        </div>

        <div class="detail-content">
            <h1 id="detail-name">Nama Makanan</h1>
            <p id="detail-price" class="detail-price">Rp 0</p>
            <p id="detail-desc">Deskripsi makanan.</p>
            <label for="detail-notes">Catatan untuk restoran</label>
            <textarea id="detail-notes" class="detail-notes" placeholder="Contoh: sambal dipisah"></textarea>
        </div>

        <footer class="detail-footer">
            <div class="qty">
                <button id="qty-decrease" type="button">-</button>
                <span id="detail-qty">1</span>
                <button id="qty-increase" type="button">+</button>
            </div>
            <button id="add-order" class="add-order" type="button">Tambah ke Pesanan</button>
        </footer>
    </article>

    <script src="scripts/app-data.js"></script>
    <script src="scripts/item-detail.js"></script>
</body>
</html>
